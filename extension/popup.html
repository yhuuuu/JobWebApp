<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      width: 340px;
      background: #f8fafc;
      color: #1e293b;
    }

    .header {
      background: linear-gradient(135deg, #0a66c2, #004182);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon { font-size: 20px; }
    .header-title { color: #fff; font-size: 15px; font-weight: 800; }
    .header-sub { color: #93c5fd; font-size: 11px; margin-top: 1px; }

    .body { padding: 14px 16px; }

    .state-idle, .state-loading, .state-error, .state-nopage {
      text-align: center;
      padding: 24px 12px;
    }
    .state-idle .icon, .state-loading .icon,
    .state-error .icon, .state-nopage .icon { font-size: 32px; margin-bottom: 10px; }
    .state-idle p, .state-error p, .state-nopage p { font-size: 13px; color: #64748b; line-height: 1.5; }
    .state-loading p { font-size: 13px; color: #7c3aed; font-weight: 600; }

    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .field .value { font-size: 13px; color: #1e293b; font-weight: 600; line-height: 1.4; }
    .field .value.muted { color: #94a3b8; font-style: italic; font-weight: 400; }
    .field textarea {
      width: 100%; border: 1.5px solid #e2e8f0; border-radius: 8px;
      padding: 8px 10px; font-size: 12px; color: #374151; resize: vertical;
      background: #fff; font-family: inherit; outline: none; line-height: 1.5;
    }

    .divider { height: 1px; background: #f1f5f9; margin: 12px 0; }

    .btn-primary {
      width: 100%; padding: 12px; background: linear-gradient(135deg, #0a66c2, #004182);
      color: #fff; border: none; border-radius: 9px; font-size: 14px;
      font-weight: 700; cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 7px; margin-bottom: 8px;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-autofill {
      width: 100%; padding: 12px; background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff; border: none; border-radius: 9px; font-size: 14px;
      font-weight: 700; cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 7px; margin-bottom: 8px;
    }
    .btn-autofill:hover { opacity: 0.9; }
    .btn-secondary {
      width: 100%; padding: 9px; background: #f1f5f9;
      color: #475569; border: none; border-radius: 9px; font-size: 13px;
      font-weight: 600; cursor: pointer;
    }
    .btn-secondary:hover { background: #e2e8f0; }

    .success {
      background: #f0fdf4; border: 1.5px solid #bbf7d0; border-radius: 10px;
      padding: 14px 16px; text-align: center;
    }
    .success .icon { font-size: 28px; margin-bottom: 8px; }
    .success p { font-size: 13px; color: #15803d; font-weight: 600; }
    .success .sub { font-size: 12px; color: #64748b; margin-top: 4px; font-weight: 400; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🎯</div>
    <div>
      <div class="header-title">JobHunt Importer</div>
      <div class="header-sub">LinkedIn → Your App</div>
    </div>
  </div>

  <div class="body" id="body">
    <div class="state-loading">
      <div class="icon">⏳</div>
      <p>Extracting job details…</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
